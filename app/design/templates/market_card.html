<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0; width: 1280px; height: 720px; overflow: hidden;
      font-family: Inter, Arial, sans-serif; color: #101828;
      background: #f2f0e9;
    }
    .page { padding: 38px 48px; height: 100%; position: relative; }
    .card {
      height: 100%; background: #fff; border-radius: 28px; padding: 42px 48px;
      box-shadow: 0 18px 55px rgba(40, 48, 58, .12); position: relative; overflow: hidden;
    }
    .date { position: absolute; right: 48px; top: 43px; color: #667085; font-size: 18px; }
    h1 { width: 940px; margin: 70px 0 10px; font-size: 50px; line-height: 1.12; letter-spacing: -.03em; }
    .tickers { display: flex; gap: 10px; margin-top: 25px; flex-wrap: wrap; }
    .ticker {
      color: #4385ed; background: #edf4ff; border-radius: 20px;
      padding: 8px 15px; font-size: 19px; font-weight: 750;
    }
    .chart { position: absolute; left: 48px; right: 48px; bottom: 66px; height: 155px; border-bottom: 2px solid #d0d5dd; display: flex; align-items: end; gap: 18px; }
    .bar { flex: 1; border-radius: 10px 10px 0 0; background: #d6e4fb; position: relative; }
    .bar:nth-child(1) { height: 30%; } .bar:nth-child(2) { height: 42%; }
    .bar:nth-child(3) { height: 56%; } .bar:nth-child(4) { height: 72%; }
    .bar:nth-child(5) { height: 92%; background: #4385ed; }
    .bar-label { position: absolute; left: 0; right: 0; top: -29px; text-align: center; color: #344054; font-weight: 750; font-size: 16px; }
  </style>
</head>
<body>
  <div class="page">
    <div class="card">
      <div class="date">{{ date }}</div>
      <h1>{{ sentence }}</h1>
      <div class="tickers">{% for ticker in tickers[:6] %}<div class="ticker">{{ ticker }}</div>{% endfor %}</div>
      <div class="chart">
        {% for ticker in tickers[:5] %}
        <div class="bar"><div class="bar-label">{{ ticker }}</div></div>
        {% endfor %}
      </div>
    </div>
  </div>
</body>
</html>
