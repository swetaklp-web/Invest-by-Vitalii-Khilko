<!doctype html><html lang="ru"><head><meta charset="utf-8"><style>
*{box-sizing:border-box}body{margin:0;width:1280px;height:720px;font-family:Inter,Arial;color:#111;background:#f4f1e9}.card{margin:36px;height:648px;background:#fff;border-radius:30px;padding:42px 54px;position:relative;overflow:hidden}.brand{font-size:15px;color:#667085;letter-spacing:.1em;font-weight:800}.date{position:absolute;right:54px;top:43px;color:#667085}.title{font-size:43px;font-weight:850;margin-top:32px;max-width:900px}.sub{font-size:21px;color:#667085;margin-top:8px}.chart{position:absolute;left:70px;right:70px;bottom:65px;height:330px;border-left:2px solid #d0d5dd;border-bottom:2px solid #d0d5dd;display:flex;align-items:end;gap:22px;padding:0 30px}.bar{flex:1;background:{{accent_soft}};border-radius:12px 12px 0 0;position:relative}.bar:nth-child(1){height:28%}.bar:nth-child(2){height:43%}.bar:nth-child(3){height:58%}.bar:nth-child(4){height:76%}.bar:nth-child(5){height:96%;background:{{accent}}}.lab{position:absolute;top:-32px;width:100%;text-align:center;font-weight:800;color:{{accent_dark}}}.ticker{position:absolute;bottom:-32px;width:100%;text-align:center;color:#475467;font-weight:700}
</style></head><body><div class="card"><div class="brand">MARKET DATA · INVEST BY VITALII KHILKO</div><div class="date">{{date}}</div><div class="title">{{title}}</div><div class="sub">{{subtitle}}</div><div class="chart">{% for ticker in tickers[:5] %}<div class="bar"><div class="lab">{{ 12 + loop.index * 8 }}%</div><div class="ticker">{{ticker}}</div></div>{% endfor %}</div></div></body></html>
