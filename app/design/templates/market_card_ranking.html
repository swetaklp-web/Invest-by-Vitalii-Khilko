<!doctype html><html lang="ru"><head><meta charset="utf-8"><style>
*{box-sizing:border-box}body{margin:0;width:1280px;height:720px;font-family:Inter,Arial;background:#f5f2ea;color:#111}.card{margin:34px;height:652px;background:#fff;border-radius:28px;padding:42px 55px;position:relative}.title{font-size:46px;font-weight:850}.sub{font-size:21px;color:#667085;margin-top:8px}.rank{margin-top:42px;display:grid;grid-template-columns:repeat(5,1fr);gap:18px;align-items:end;height:400px}.item{display:flex;flex-direction:column;justify-content:end;height:100%;text-align:center}.badge{width:72px;height:72px;border-radius:20px;background:{{accent_soft}};color:{{accent_dark}};font-size:21px;font-weight:850;display:flex;align-items:center;justify-content:center;margin:0 auto 10px}.bar{background:{{accent_dark}};border-radius:12px 12px 0 0;height:var(--h);color:#fff;padding-top:15px;font-size:20px;font-weight:800}.foot{position:absolute;bottom:22px;left:55px;color:#98a2b3}
</style></head><body><div class="card"><div class="title">{{title}}</div><div class="sub">{{subtitle}}</div><div class="rank">{% for ticker in tickers[:5] %}<div class="item"><div class="badge">{{ticker}}</div><div class="bar" style="--h:{{35 + loop.index * 12}}%">{{loop.index}}</div></div>{% endfor %}</div><div class="foot">{{date}} · {{direction}}</div></div></body></html>
