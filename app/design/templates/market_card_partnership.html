<!doctype html><html lang="ru"><head><meta charset="utf-8"><style>
*{box-sizing:border-box}body{margin:0;width:1280px;height:720px;font-family:Inter,Arial;background:#07090e;color:#fff}.date{position:absolute;right:58px;top:42px;color:#aab2c0}.stage{height:470px;display:flex;align-items:center;justify-content:center;gap:55px}.logo{width:285px;height:220px;border:2px solid #333b49;border-radius:30px;display:flex;align-items:center;justify-content:center;font-size:68px;font-weight:850;background:#111722}.link{font-size:72px;color:{{accent}}}.bottom{height:250px;background:#fff;color:#111;padding:36px 60px}.title{font-size:42px;font-weight:850;line-height:1.14;max-width:1050px}
</style></head><body><div class="date">{{date}}</div><div class="stage"><div class="logo">{{tickers[0] if tickers else '$US'}}</div><div class="link">×</div><div class="logo">{{tickers[1] if tickers|length > 1 else '$AI'}}</div></div><div class="bottom"><div class="title">{{sentence}}</div></div></body></html>
