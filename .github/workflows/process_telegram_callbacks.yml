name: Process Telegram approval buttons

on:
  workflow_dispatch:
  schedule:
    # Emergency fallback; normal continuity is maintained by self-dispatch.
    - cron: "0 */4 * * *"

permissions:
  actions: write
  contents: read

concurrency:
  group: telegram-callbacks
  cancel-in-progress: false

jobs:
  process:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt
      - run: playwright install --with-deps chromium
      - name: Keep Telegram approval buttons online
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_REVIEW_CHAT_ID: ${{ secrets.TELEGRAM_REVIEW_CHAT_ID }}
          TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
          TELEGRAM_API_ID: ${{ secrets.TELEGRAM_API_ID }}
          TELEGRAM_API_HASH: ${{ secrets.TELEGRAM_API_HASH }}
          TELEGRAM_SESSION_STRING: ${{ secrets.TELEGRAM_SESSION_STRING }}
          X_BEARER_TOKEN: ${{ secrets.X_BEARER_TOKEN }}
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
          BARCHART_API_KEY: ${{ secrets.BARCHART_API_KEY }}
          ONINVEST_API_KEY: ${{ secrets.ONINVEST_API_KEY }}
          YAHOO_FINANCE_API_KEY: ${{ secrets.YAHOO_FINANCE_API_KEY }}
        run: timeout 20500s python -m app.main bot || test $? -eq 124
      - name: Start the next Telegram button worker
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const runs = await github.rest.actions.listWorkflowRuns({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: "process_telegram_callbacks.yml",
              status: "queued",
              per_page: 10,
            });
            const anotherQueued = runs.data.workflow_runs.some(
              (run) => run.id !== context.runId
            );
            if (!anotherQueued) {
              await github.rest.actions.createWorkflowDispatch({
                owner: context.repo.owner,
                repo: context.repo.repo,
                workflow_id: "process_telegram_callbacks.yml",
                ref: context.payload.repository.default_branch,
              });
              core.info("Started the next Telegram button worker");
            }
