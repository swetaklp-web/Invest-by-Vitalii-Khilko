<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; width: 1280px; height: 720px; overflow: hidden; font-family: Inter, Arial, sans-serif; color: #101828; background: {{ accent_soft }}; }
    .page { padding: 38px 48px; height: 100%; }
    .card { height: 100%; border-radius: 30px; background: white; overflow: hidden; display: grid; grid-template-columns: {% if layout == 1 %}58% 42%{% else %}42% 58%{% endif %}; box-shadow: 0 18px 55px rgba(35,61,98,.14); }
    .visual { {% if layout == 1 %}order:2;{% endif %} background: linear-gradient({{ 115 + variant_number * 17 }}deg, {{ accent_dark }}, {{ accent }}); color: white; padding: 46px; position: relative; overflow: hidden; }
    .orb { position:absolute; width:330px; height:330px; border:70px solid rgba(255,255,255,.16); border-radius:50%; right:-80px; top:-70px; }
    .ticker-big { margin-top: 135px; font-size: 76px; font-weight: 850; line-height: 1; letter-spacing: -.04em; }
    .bars { position:absolute; left:46px; right:46px; bottom:54px; height:145px; display:flex; align-items:end; gap:12px; }
    .bar { flex:1; background:rgba(255,255,255,.30); border-radius:9px 9px 0 0; }
    .bar:nth-child(1){height:32%}.bar:nth-child(2){height:56%}.bar:nth-child(3){height:43%}.bar:nth-child(4){height:78%}.bar:nth-child(5){height:100%;background:white}
    .content { padding: 48px 52px; position: relative; }
    .date { color:#667085; font-size:18px; }
    h1 { margin: 92px 0 18px; font-size: 47px; line-height:1.12; letter-spacing:-.035em; }
    .tickers { display:flex; gap:10px; margin-top:34px; flex-wrap:wrap; }
    .ticker { color:{{ accent_dark }}; background:{{ accent_soft }}; border-radius:20px; padding:8px 15px; font-size:19px; font-weight:750; }
  </style>
</head>
<body><div class="page"><div class="card">
  <div class="visual"><div class="orb"></div><div class="ticker-big">{{ tickers[0] if tickers else '$US' }}</div><div class="bars"><div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div></div></div>
  <div class="content"><div class="date">{{ date }}</div><h1>{{ sentence }}</h1><div class="tickers">{% for ticker in tickers[:6] %}<div class="ticker">{{ ticker }}</div>{% endfor %}</div></div>
</div></div></body>
</html>
