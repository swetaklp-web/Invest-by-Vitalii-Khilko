<!doctype html><html lang="ru"><head><meta charset="utf-8"><style>
*{box-sizing:border-box}body{margin:0;width:1280px;height:720px;font-family:Inter,Arial;background:#07090e;color:#fff}.top{padding:42px 58px;color:#aab2c0;font-size:16px;letter-spacing:.1em}.stage{height:440px;display:flex;align-items:center;justify-content:center;gap:55px}.logo{width:285px;height:220px;border:2px solid #333b49;border-radius:30px;display:flex;align-items:center;justify-content:center;font-size:68px;font-weight:850;background:#111722}.link{font-size:72px;color:{{accent}}}.bottom{height:190px;background:#fff;color:#111;padding:28px 60px}.title{font-size:35px;font-weight:800}.sub{font-size:22px;color:#475467;margin-top:12px}.tag{color:{{accent}}}
</style></head><body><div class="top">PARTNERSHIP · {{date}}</div><div class="stage"><div class="logo">{{tickers[0] if tickers else '$US'}}</div><div class="link">×</div><div class="logo">{{tickers[1] if tickers|length > 1 else '$AI'}}</div></div><div class="bottom"><div class="title">{{title}}</div><div class="sub">{{subtitle}} · <span class="tag">{{direction}}</span></div></div></body></html>
