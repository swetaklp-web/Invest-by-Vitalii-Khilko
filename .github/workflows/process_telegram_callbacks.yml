name: Process Telegram approval buttons

on:
  workflow_dispatch:
  schedule:
    # Frequent restarts reduce gaps when GitHub drops or delays a scheduled event.
    - cron: "*/15 * * * *"

concurrency:
  group: telegram-callbacks
  cancel-in-progress: true

jobs:
  process:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt
      - run: playwright install --with-deps chromium
      - name: Keep Telegram approval buttons online
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_REVIEW_CHAT_ID: ${{ secrets.TELEGRAM_REVIEW_CHAT_ID }}
          TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
        run: timeout 1100s python -m app.main bot || test $? -eq 124
