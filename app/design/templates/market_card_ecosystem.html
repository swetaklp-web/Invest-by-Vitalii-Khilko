<!doctype html><html lang="ru"><head><meta charset="utf-8"><style>
*{box-sizing:border-box}body{margin:0;width:1280px;height:720px;font-family:Inter,Arial;background:#08111f;color:#fff}.head{padding:40px 55px}.title{font-size:42px;font-weight:850;line-height:1.12;max-width:900px}.map{position:relative;height:500px}.core{position:absolute;left:50%;top:47%;transform:translate(-50%,-50%);width:210px;height:210px;border-radius:50%;background:{{accent}};display:flex;align-items:center;justify-content:center;text-align:center;font-size:24px;font-weight:850;box-shadow:0 0 0 35px rgba(255,255,255,.06)}.node{position:absolute;width:175px;height:105px;border:1px solid #40516a;border-radius:22px;background:#142238;display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:800}.node:nth-child(2){left:90px;top:45px}.node:nth-child(3){right:90px;top:45px}.node:nth-child(4){left:70px;bottom:55px}.node:nth-child(5){right:70px;bottom:55px}.line{position:absolute;left:20%;right:20%;top:47%;height:2px;background:#40516a}.date{position:absolute;right:55px;top:45px;color:#aab8ca}
</style></head><body><div class="head"><div class="title">{{sentence}}</div><div class="date">{{date}}</div></div><div class="map"><div class="line"></div><div class="core">{{tickers[0] if tickers else '$US'}}</div>{% for ticker in tickers[1:5] %}<div class="node">{{ticker}}</div>{% endfor %}</div></body></html>
