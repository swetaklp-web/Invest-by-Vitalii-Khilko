name: Morning market draft

on:
  workflow_dispatch:
  schedule:
    # 07:10 UTC = 10:10 Moscow time (MSK, UTC+3).
    - cron: "10 7 * * *"
    # Fallback for a delayed or dropped GitHub scheduled event.
    - cron: "23 7 * * *"

permissions:
  actions: read
  contents: read

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - name: Skip duplicate fallback run
        id: guard
        if: github.event_name == 'schedule'
        uses: actions/github-script@v7
        with:
          script: |
            const currentRunId = context.runId;
            const current = await github.rest.actions.getWorkflowRun({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: currentRunId,
            });
            const cutoff = new Date(current.data.created_at);
            cutoff.setUTCHours(7, 0, 0, 0);
            const currentCreatedAt = new Date(current.data.created_at);
            const runs = await github.rest.actions.listWorkflowRuns({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: current.data.workflow_id,
              event: 'schedule',
              per_page: 20,
            });
            const duplicate = runs.data.workflow_runs.some((run) => {
              const createdAt = new Date(run.created_at);
              if (run.id === currentRunId || createdAt < cutoff || createdAt >= currentCreatedAt) return false;
              return ['queued', 'in_progress'].includes(run.status) || run.conclusion === 'success';
            });
            core.setOutput('proceed', duplicate ? 'false' : 'true');
      - uses: actions/setup-python@v5
        if: github.event_name != 'schedule' || steps.guard.outputs.proceed == 'true'
        with:
          python-version: "3.12"
          cache: pip
      - if: github.event_name != 'schedule' || steps.guard.outputs.proceed == 'true'
        run: pip install -r requirements.txt
      - if: github.event_name != 'schedule' || steps.guard.outputs.proceed == 'true'
        run: playwright install --with-deps chromium
      - name: Generate and send morning draft
        if: github.event_name != 'schedule' || steps.guard.outputs.proceed == 'true'
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_REVIEW_CHAT_ID: ${{ secrets.TELEGRAM_REVIEW_CHAT_ID }}
          TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
          TELEGRAM_API_ID: ${{ secrets.TELEGRAM_API_ID }}
          TELEGRAM_API_HASH: ${{ secrets.TELEGRAM_API_HASH }}
          TELEGRAM_SESSION_STRING: ${{ secrets.TELEGRAM_SESSION_STRING }}
          X_BEARER_TOKEN: ${{ secrets.X_BEARER_TOKEN }}
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
          BARCHART_API_KEY: ${{ secrets.BARCHART_API_KEY }}
          ONINVEST_API_KEY: ${{ secrets.ONINVEST_API_KEY }}
          YAHOO_FINANCE_API_KEY: ${{ secrets.YAHOO_FINANCE_API_KEY }}
        run: python -m app.main generate --type morning_brief
